<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Goobert's Kitchen — Test Build</title>
<meta name="theme-color" content="#3A2F2B" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Goobert's" />
<style>
  :root {
    --cream: #FBF6EE;
    --ink: #3A2F2B;
    --ink-soft: #6B5F58;
    --accent: #C87A3D;
    --accent-soft: #F0DFC8;
    --good: #6E9B6E;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 32px 24px;
    text-align: center;
  }
  .bowl {
    width: 88px;
    height: 88px;
    border-radius: 22px;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(58,47,43,0.18);
  }
  h1 {
    font-size: 28px;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .subtitle {
    color: var(--ink-soft);
    font-size: 15px;
    margin: 0 0 32px;
  }
  .badge {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 24px;
  }
  .checklist {
    width: 100%;
    max-width: 340px;
    background: white;
    border-radius: 18px;
    padding: 6px;
    box-shadow: 0 4px 16px rgba(58,47,43,0.08);
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 14px;
    border-bottom: 1px solid #F1EAE0;
    text-align: left;
  }
  .check-item:last-child { border-bottom: none; }
  .dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    background: #E9E2D8;
    color: var(--ink-soft);
  }
  .dot.pass { background: var(--good); color: white; }
  .label { font-size: 14px; font-weight: 500; }
  .hint { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
  <div class="bowl">🍲</div>
  <span class="badge">Framework Test</span>
  <h1>Goobert's Kitchen</h1>
  <p class="subtitle">If you can see this, the app shell works.</p>

  <div class="checklist" id="checklist">
    <div class="check-item">
      <div class="dot" id="dot-loaded">•</div>
      <div>
        <div class="label">Page loaded</div>
        <div class="hint">You're reading this, so ✓</div>
      </div>
    </div>
    <div class="check-item">
      <div class="dot" id="dot-sw">•</div>
      <div>
        <div class="label" id="label-sw">Offline support</div>
        <div class="hint" id="hint-sw">Registering service worker…</div>
      </div>
    </div>
    <div class="check-item">
      <div class="dot" id="dot-installed">•</div>
      <div>
        <div class="label" id="label-installed">Running as installed app</div>
        <div class="hint" id="hint-installed">Checking…</div>
      </div>
    </div>
    <div class="check-item">
      <div class="dot" id="dot-online">•</div>
      <div>
        <div class="label" id="label-online">Connection</div>
        <div class="hint" id="hint-online">Checking…</div>
      </div>
    </div>
  </div>

  <footer>v0 test build · built for two phones, not just one 🐢</footer>

<script>
  function setStatus(id, pass, label, hint) {
    const dot = document.getElementById('dot-' + id);
    const labelEl = document.getElementById('label-' + id);
    const hintEl = document.getElementById('hint-' + id);
    dot.textContent = pass ? '✓' : '–';
    dot.classList.toggle('pass', pass);
    if (label && labelEl) labelEl.textContent = label;
    if (hint && hintEl) hintEl.textContent = hint;
  }

  setStatus('loaded', true);

  // Installed / standalone check
  const isStandalone =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;
  setStatus(
    'installed',
    isStandalone,
    'Running as installed app',
    isStandalone
      ? 'Yes — opened from Home Screen'
      : 'Not yet — open this in Safari/Chrome first, then Add to Home Screen'
  );

  // Online/offline live check
  function updateOnline() {
    setStatus(
      'online',
      navigator.onLine,
      'Connection',
      navigator.onLine ? 'Online' : 'Offline — and still loaded, so caching works'
    );
  }
  updateOnline();
  window.addEventListener('online', updateOnline);
  window.addEventListener('offline', updateOnline);

  // Service worker registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => {
        setStatus('sw', true, 'Offline support', 'Service worker registered');
      })
      .catch((err) => {
        setStatus('sw', false, 'Offline support', 'Failed: ' + err.message);
      });
  } else {
    setStatus('sw', false, 'Offline support', 'Not supported in this browser');
  }
</script>
</body>
</html>
